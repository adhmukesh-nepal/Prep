<style>
  :root{--read:#1F6F8B;--recall:#548235;--rank:#BF8F00;--ink:#23303a;--muted:#6b7a85;--line:#e3e8ec;--bg:#f6f8f9;--card:#fff}
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;color:var(--ink);background:var(--bg);-webkit-font-smoothing:antialiased}
  .wrap{max-width:760px;margin:0 auto;padding:0 18px}
  a{color:var(--read);text-decoration:none}
  .topbar{background:#16323d;color:#fff}
  .topbar .wrap{display:flex;align-items:center;justify-content:space-between;height:52px}
  .topbar a{color:#fff;font-weight:700}
  .topbar a.back{color:#cfe0e7;font-weight:400;font-size:14px}
  h1{font-size:22px;margin:22px 0 4px}
  .sub{color:var(--muted);font-size:14px;margin:0 0 16px}
  .decks{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:18px}
  .decks button{border:1px solid var(--line);background:var(--card);color:var(--ink);border-radius:999px;padding:8px 15px;font-size:14px;font-weight:600;cursor:pointer}
  .decks button.active{background:#16323d;color:#fff;border-color:#16323d}
  .card{background:var(--card);border:1px solid var(--line);border-top:4px solid var(--read);border-radius:16px;min-height:240px;display:flex;align-items:center;justify-content:center;text-align:center;padding:30px 26px;cursor:pointer;box-shadow:0 8px 24px rgba(20,50,61,.07);user-select:none}
  .card .face{font-size:20px;line-height:1.5}
  .card .q{font-weight:700}
  .card .a{font-size:18px}
  .hint{color:var(--muted);font-size:12px;text-align:center;margin:10px 0 16px}
  .controls{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:10px}
  .controls button{border:1px solid var(--line);background:var(--card);border-radius:10px;padding:11px 18px;font-size:15px;font-weight:700;cursor:pointer;color:var(--ink)}
  .controls button:hover{filter:brightness(0.98)}
  .controls .flip{background:var(--recall);color:#fff;border-color:var(--recall)}
  .meta{display:flex;align-items:center;justify-content:space-between;color:var(--muted);font-size:13px;margin-bottom:30px}
  .meta a{cursor:pointer}
  @media(max-width:520px){.card .face{font-size:18px}}

<div class="topbar"><div class="wrap"><a href="/">Health Exam Prep</a><a class="back" href="ch5.html">← Chapter 5</a></div></div>
<div class="wrap">
  <h1>Flashcards — Chapter 5</h1>
  <p class="sub">Tap a card to flip. Use ← → to move, Space to flip.</p>
  <div class="decks" id="decks"></div>
  <div class="card" id="card" onclick="flip()"><div class="face q" id="face">Loading…</div></div>
  <div class="hint" id="hint">Tap card to reveal the answer</div>
  <div class="controls">
    <button onclick="prev()">← Prev</button>
    <button class="flip" onclick="flip()">Flip</button>
    <button onclick="next()">Next →</button>
  </div>
  <div class="meta"><span id="count"></span><a onclick="shuffle()">↻ Shuffle</a></div>
</div>
<script>
const DECKS = [{"id":"epi","name":"Epidemiology core","accent":"var(--read)","cards":[["John Snow is known as…","Father of modern epidemiology (Broad Street pump, cholera)."],["First epidemiologist / 'father of medicine'","Hippocrates."],["Aims of epidemiology (DIP)","Describe distribution · Identify risk factors · Provide data for planning."],["Case-control study measures…","Odds Ratio (retrospective; many causes of ONE disease)."],["Cohort study measures…","Relative Risk + Incidence (prospective; cause → effect)."],["Weakest observational study","Ecological (population as unit)."],["Cross-sectional study measures…","Prevalence (one point in time)."],["Gold standard to prove causation","Randomised Controlled Trial (RCT)."],["P = I × D means…","Prevalence = Incidence × mean Duration."],["Incidence vs prevalence","Incidence = new cases; prevalence = all existing cases."],["Four levels of prevention","Primordial → Primary → Secondary → Tertiary."],["Immunization is which level?","Primary prevention (specific protection)."],["Screening is which level?","Secondary prevention."],["Rehabilitation is which level?","Tertiary prevention."],["Sensitivity vs specificity","Sensitivity = detects disease (screening); specificity = clears the healthy (diagnosis)."],["The 5 F's of faeco-oral spread","Flies, Fingers, Fomites, Food, Fluid."],["Types of reservoir","Human, Animal, Non-living (environment)."],["Types of carrier","Incubatory, Convalescent, Healthy, Chronic."],["Endemic / Epidemic / Pandemic / Sporadic","Constant in area / excess over expected / across countries / scattered."],["Herd immunity does NOT help which disease?","Tetanus (soil-borne, not person-to-person)."],["First step in investigating an epidemic","Verify the diagnosis."],["An area is declared disease-free after…","Twice the incubation period since the last case."],["Triage colours","Red = now · Yellow = delayed · Green = minor · Black = dead. (No blue.)"],["IgG vs IgM","IgG crosses the placenta; IgM = recent infection."],["Immunoglobulins (GAMED)","IgG, IgA, IgM, IgE, IgD."]]},{"id":"diseases","name":"Disease KEY facts","accent":"var(--read)","cards":[["Gastroenteritis & Food Poisoning","Staphylococcal type has the SHORTEST incubation (1–8 h, preformed toxin); Salmonella commonest; rehydration is the mainstay."],["Measles (दादुरा)","Koplik's spots pathognomonic; rash behind ears → centrifugal; commonest complication diarrhoea, deadliest pneumonia; vaccine at 9 mo."],["Rubella","1st-trimester infection → Congenital Rubella Syndrome (deafness, cardiac/PDA, cataract); after 16 wk no major defect."],["Mumps","Commonest complication: orchitis (adults), aseptic meningitis (children). Man is the only host."],["Chickenpox (बिफर)","Pleomorphic 'dew-drop' rash, centripetal (trunk-first); all stages at once; scabs are non-infectious."],["Influenza","Only type A causes pandemics; antigenic shift = pandemic, drift = seasonal; no viraemia."],["Poliomyelitis","Asymmetric flaccid paralysis with NO sensory loss; commonest form is inapparent."],["HIV / AIDS","Highest transmission = blood transfusion (>90%); commonest route = sexual; window 3–12 wk; confirm with Western blot."],["Rabies","~100% fatal once symptomatic; hydrophobia pathognomonic; Negri bodies; man is a dead-end host."],["Cholera (हैजा)","Rice-water stool, painless, afebrile; rehydration mainstay; pregnancy DOC = furazolidone."],["Typhoid Fever","Step-ladder fever + relative bradycardia (wk1) → rose spots (wk2) → perforation (wk3, commonest complication)."],["Giardiasis","Greasy, foul, fatty stool (steatorrhoea); DOC = metronidazole."],["Malaria (औलो)","Vivax commonest in Nepal; relapse (vivax/ovale) from hypnozoites → primaquine; infective stage = sporozoite."],["Lymphatic Filariasis (हात्तीपाइले)","Nocturnal microfilariae; thick night blood film = gold standard; Culex vector; MDA = DEC + albendazole."],["Japanese Encephalitis","Pig = amplifier, Culex = vector, man = dead-end; endemic in 24 Terai districts."],["Kala-azar","Fever >2 wk + hepatosplenomegaly + skin darkening; sand-fly vector; DOC = liposomal amphotericin B."],["Pertussis","Catarrhal stage most infectious; highest mortality under 6 months; DOC erythromycin; prevented by DPT."],["Diphtheria","Greyish 'wash-leather' pseudomembrane + bull-neck; toxin → myocarditis; antitoxin + penicillin; Schick test."],["Tuberculosis","Cough ≥2 wk = suspect; sputum/GeneXpert diagnosis; first-line RIPES; ethambutol bacteriostatic; BCG is LIVE."],["Leprosy","Earliest sensation lost = light touch; hypopigmented anaesthetic patch; ulnar nerve; MDT = R+D+C."],["Dengue","Aedes aegypti bites in DAYTIME; +tourniquet test, thrombocytopenia; AVOID aspirin."],["COVID-19","SARS-CoV-2; loss of taste/smell a clue; RT-PCR; droplet/contact spread."],["Scabies (लुतो)","Intense nocturnal itch + web-space burrows; permethrin; treat the whole family."],["Ring Worm (दाद)","Ring-shaped patch with central clearing; KOH mount; it's fungal (no worm)."],["Leptospirosis","Rodent urine → water; calf myalgia + conjunctival suffusion; Weil's = jaundice + renal failure; doxycycline."]]},{"id":"confuse","name":"Don't-confuse pairs","accent":"var(--rank)","cards":[["Measles rash vs Chickenpox rash","Measles = maculopapular & centrifugal (face → down); chickenpox = vesicular & centripetal (trunk-first)."],["Staph vs Botulism food poisoning","Staph = shortest IP, toxin, vomiting; Botulism = long IP, neuroparalytic, most serious. Short ≠ serious."],["Rubella vs Measles","Rubella = German/3-day measles, mild; Measles = rubeola, Koplik spots, severe."],["Mumps complication by age","Orchitis in adults vs aseptic meningitis in children."],["Centripetal vs centrifugal rash","Chickenpox = centripetal (trunk-dense); smallpox/measles = centrifugal (limbs/face)."],["Antigenic shift vs drift","Shift = sudden, reassortment → pandemic; drift = gradual mutation → seasonal."],["OPV vs IPV","OPV = live, humoral + intestinal immunity (can cause VAPP); IPV = killed, humoral only."],["ELISA vs Western blot","ELISA = screening (sensitive); Western blot = confirmatory (specific)."],["Rabies transmission","Rat bites and human bites do NOT transmit rabies; dog & bat bites/licks do."],["Cholera: mainstay vs antibiotics","Rehydration is the mainstay; antibiotics only shorten it. Doxycycline (adults), furazolidone (pregnancy)."],["Typhoid diagnosis by week (BASU)","Blood (wk1) → Antibody/Widal (wk2) → Stool (wk3) → Urine (wk4)."],["Giardiasis vs Amoebiasis","Giardia = non-bloody fatty diarrhoea (small bowel); amoebiasis = bloody dysentery (large bowel)."],["Spleen rate vs infant parasite rate","Spleen rate = endemicity (chronic); infant parasite rate = recent transmission."],["Filariasis vector","Culex (also JE) — not Anopheles (malaria) or Aedes (dengue)."],["JE: pig vs man","Pig amplifies the virus; man is a dead-end host (no onward spread)."],["Kala-azar blood picture","Causes leucoPENIA, not leucocytosis; PKDL is the main human reservoir."],["Pertussis & maternal antibody","Maternal antibody does NOT protect the newborn — vaccinate early."],["Schick vs tuberculin vs lepromin","Schick = diphtheria susceptibility; tuberculin = TB exposure; lepromin = leprosy prognosis."],["BCG & GeneXpert","BCG is a LIVE vaccine (from M. bovis); GeneXpert/MTB-RIF detects rifampicin resistance."],["Lepromin test","Gives prognosis/classification — NOT a diagnostic test. PB = 1–5 lesions, MB = ≥6."],["Day-biters vs night-biters","Aedes (dengue) bites by day; Anopheles (malaria) & Culex (JE/filaria) bite at night."],["Isolation vs Quarantine","Isolation = separating the sick; quarantine = restricting the exposed-but-well."],["Scabies contacts","Treat ALL close contacts at once even if asymptomatic, or reinfection recurs."],["'Ring worm'","A fungal (dermatophyte) infection — there is NO worm despite the name."],["Leptospirosis testing","MAT is the gold-standard test; doxycycline is used for treatment AND prophylaxis."],["Case-control vs Cohort","Case-control → backward, Odds Ratio, many causes of ONE disease. Cohort → forward, Relative Risk + incidence, many diseases from ONE exposure."],["Incidence vs Prevalence","Incidence = NEW cases (cohort); prevalence = ALL existing cases (cross-sectional)."],["Distribution vs Determinants","Distribution = descriptive (time/place/person); determinants = analytical (risk factors)."]]},{"id":"mnemonics","name":"Mnemonics","accent":"var(--recall)","cards":[["Aims of epidemiology","DIP = Describe distribution, Identify risk factors, Provide planning data."],["Definition keywords","“Dr. DF Patel Controls” = Distribution, Determinants, Frequency, Population, Control."],["Observational studies","ECCC = Ecological, Cross-sectional, Case-control, Cohort."],["Cohort study yields","AIR = Attributable risk, Incidence, Relative risk."],["Reservoir / carrier","HAN / ICH = Human-Animal-Nonliving / Incubatory-Convalescent-Healthy."],["Levels of prevention","Pri-Pri-Se-Te = Primordial → Primary → Secondary → Tertiary."],["Indirect transmission","5 F's = Flies, Fingers, Fomites, Food, Fluid."],["Transplacental infections","ToRCHS = Toxoplasma, Rubella, CMV, Herpes, Syphilis."],["Immunoglobulins","GAMED = IgG, IgA, IgM, IgE, IgD."],["Causation theorists","Pasteur = Germ theory; Pettenkofer = multifactorial; MacMahon = web of causation."],["Triage colours","Red → Yellow → Green → Black (now / delayed / minor / dead)."],["Rash day after fever","“Very Sick Patient Must Take Double Tablet” = Varicella1, Scarlet2, Pox3, Measles4, Typhus5, Dengue6, Typhoid7."],["Measles","3 C's + Koplik = Cough, Coryza, Conjunctivitis; rash behind the ears."],["Measles complications","diarrhoea Most · pneumonia Kills · Otitis in Kids · SSPE Rare."],["Chickenpox","“Chicken sits in the CENTRE” = centripetal (trunk-first)."],["Rubella (CRS)","Eye · Ear · Heart = Cataract, Deafness, Cardiac/PDA."],["Mumps","MOP = Meningitis (children), Orchitis (adults), Pancreatitis."],["Influenza","Shift is Sudden (pandemic), Drift is small (seasonal)."],["Poliomyelitis","Floppy & Asymmetric, sensation Intact."],["COVID-19","Fever · dry Cough · loss of Smell."],["Cholera","Rice-water stool · washerman's hands & feet · painless · no fever."],["Cholera — drug of choice","Adults Doxy · Pregnant Furazolidone · Kids Cotrim."],["Typhoid — by week","Week 1 ladder fever → Week 2 rose spots → Week 3 perforation."],["Typhoid — diagnosis","BASU = Blood (wk1), Antibody/Widal (wk2), Stool (wk3), Urine (wk4)."],["Giardiasis","Giardia = Greasy: Fatty, Foul, Floating stool."],["Malaria — stages","Cold → Hot → Sweating."],["Malaria — relapse","VO relapse = Vivax & Ovale (hypnozoites)."],["Malaria — indices","Spleen = endemicity; Infant parasite rate = recent transmission."],["Rabies","3 phobias: Hydro · Aero · Photo; watch the dog 10 days."],["Hepatitis — routes","A & E you EAT; B-C-D = Blood/sex."],["Hepatitis B — markers","First HBsAg, Last anti-HBs."],["HIV — transmission","Blood > Baby > Sex > Needle."],["Tuberculosis","RIPES = Rifampicin, Isoniazid, Pyrazinamide, Ethambutol, Streptomycin; cough ≥ 2 wk = suspect."],["Diphtheria","Bull-neck · Pseudomembrane · Croupy cough."],["Pertussis","Catarrhal → Paroxysmal (whoop) → Convalescent."],["Filariasis","Night blood · elephant legs · Culex."],["Japanese encephalitis","Pig amplifies · Culex carries · Man dead-end."],["Dengue","Day-biting Aedes · Break-bone + retro-orbital pain."],["Leptospirosis","Rat-urine fever: Jaundice · red Eyes · Calf pain."],["Kala-azar","Kala = black: fever >2 wk + big spleen + dark skin."],["Leprosy","Patch · Numbness · thick Nerve · AFB."],["Tetanus","3 signs: lockjaw · Risus sardonicus · Opisthotonus."],["Scabies","Night itch · web-space burrows."],["Ring worm","Ring-shaped patch, central clearing."],["Helminths","Ascaris = commonest worm; Hookworm = anaemia."],["Food poisoning","Staph Shortest · Salmonella commonest · Botulism Baddest."]]},{"id":"psc","name":"PSC past questions","accent":"var(--rank)","cards":[["Cholera cases (new + old) are termed as","Prevalence"],["Prevalence rate relates to","Both new and old cases"],["Prevalence is a type of","Proportion"],["Incidence of disease in a community is best calculated by","Cohort study"],["Which study determines the prevalence of a disease?","Cross-sectional study"],["The type of epidemiology that deals with risk factors of disease is","Analytical epidemiology"],["Which epidemiological study does NOT test a hypothesis?","Descriptive study"],["In an epidemic, the first case that comes to the notice of an investigator is the","Index case"],["First step during an epidemic investigation","Confirm that the epidemic exists"],["All are internationally notifiable diseases EXCEPT","Tuberculosis"],["Which one of the following is primary prevention?","Vaccination"],["Control of mosquitoes by the sterile-male technique is","Genetic control"],["Primary prevention of hypertension includes all EXCEPT","Tracking of blood pressure (that is secondary)"],["Liquid paraffin can be sterilized by","Hot-air oven"],["Which age group is the target group of immunization?","Below 1 year"],["Recommended age for the first dose of DPT vaccine","6 weeks"],["Rotavirus vaccine is given at","6 weeks and 10 weeks of age"],["Pentavalent vaccine contains antigens against","Diphtheria, Pertussis, Tetanus, Hib and Hepatitis B"],["BCG and OPV belong to which type of vaccine?","Live (attenuated) vaccine"],["Which of the following is a live attenuated vaccine?","Polio (OPV)"],["Ideal temperature for storage of vaccines in the refrigerator","+2 to +8 °C"],["Which vaccine should NOT be frozen?","All of the above (DPT, TT, Hep-B)"],["CCEOP stands for","Cold Chain Equipment Optimization Platform"],["Everything about immunization is true EXCEPT","'It prevents allergy'"],["True regarding vaccination","Vaccination is a method of active immunization"],["The most common cause of death in a child with measles","Pneumonia"],["The causative organism of measles (Rubeola)","RNA Paramyxovirus"],["A typical clinical feature of measles","Koplik's spots"],["The reservoir for measles is","Man"],["According to WHO, a TB case is confirmed by","Sputum positive"],["Most common extra-pulmonary TB in Nepal","Lymph node TB"],["WHO End-TB strategy: 80% reduction in TB incidence by","2030"],["Theme of World TB Day 2022","Invest to end TB, save lives"],["Drug used for the radical cure of malaria","Primaquine"],["The infective form of the malarial parasite","Sporozoite"],["Aim of the National Malaria Strategic Plan (NMSP)","Malaria elimination in Nepal by 2025"],["Mosquito transmits which of the following diseases?","All of the above"],["Kala-azar is transmitted by which vector?","Sand fly"],["Vector responsible for transmission of Leishmania","Phlebotomus argentipes"],["Kala-azar does not occur at an altitude above","600 metres"],["Leprosy is a public-health problem if prevalence is more than","1 per 10,000"],["Incidence of leprosy in Nepal (DoHS 2076/77)","6.22 per lakh"],["Japanese encephalitis is spread by","Culex mosquito"],["All are stages of Japanese encephalitis EXCEPT","Chronic encephalitic stage"],["HIV is best diagnosed by","Western blot"],["Hepatitis A is transmitted by","Feco-oral route"],["Incubation period of Hepatitis A","15–45 days"],["Drugs used in MDA for Lymphatic Filariasis","Diethylcarbamazine (DEC) + Albendazole"],["In dengue fever, laboratory diagnosis can reveal","Thrombocytopenia"],["Usual incubation period of staphylococcal food poisoning","1–8 hours"],["All are true about diphtheria EXCEPT","'The bacterium produces endotoxin' (it is an EXOtoxin)"],["Characteristic feature of scabies","Burrow"],["Mites are the vector of","Scabies"],["Scabies is classified as a","Water-washed disease"],["NOT a treatment for scabies","Griseofulvin"],["Most common dermatophyte causing tinea corporis","Trichophyton rubrum"]]}];
let deck = DECKS[0], order = [], pos = 0, flipped = false;

function buildTabs(){
  const c = document.getElementById('decks'); c.innerHTML='';
  DECKS.forEach(d=>{
    const b=document.createElement('button');
    b.textContent = d.name + ' ('+d.cards.length+')';
    if(d.id===deck.id) b.className='active';
    b.onclick=()=>selectDeck(d.id);
    c.appendChild(b);
  });
}
function selectDeck(id){
  deck = DECKS.find(d=>d.id===id);
  order = deck.cards.map((_,i)=>i);
  pos=0; flipped=false;
  document.getElementById('card').style.borderTopColor = deck.accent;
  buildTabs(); render();
  history.replaceState(null,'', '?deck='+id);
}
function render(){
  const card = deck.cards[order[pos]];
  const face = document.getElementById('face');
  face.className = 'face ' + (flipped?'a':'q');
  face.textContent = flipped ? card[1] : card[0];
  document.getElementById('hint').textContent = flipped ? 'Tap to see the question' : 'Tap card to reveal the answer';
  document.getElementById('count').textContent = (pos+1)+' / '+deck.cards.length;
}
function flip(){ flipped=!flipped; render(); }
function next(){ pos=(pos+1)%deck.cards.length; flipped=false; render(); }
function prev(){ pos=(pos-1+deck.cards.length)%deck.cards.length; flipped=false; render(); }
function shuffle(){ for(let i=order.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[order[i],order[j]]=[order[j],order[i]];} pos=0; flipped=false; render(); }
document.addEventListener('keydown',e=>{ if(e.key==='ArrowRight')next(); else if(e.key==='ArrowLeft')prev(); else if(e.key===' '){e.preventDefault();flip();} });

const params = new URLSearchParams(location.search);
const want = params.get('deck');
selectDeck(DECKS.some(d=>d.id===want)?want:DECKS[0].id);
</script>
